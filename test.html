<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Sistema de Bomberos</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>Test de Funcionalidad</h1>
        <button id="test-btn">Crear Registro de Prueba</button>
        <div id="result"></div>
    </div>
    <script src="js/app.js"></script>
    <script>
        document.getElementById('test-btn').addEventListener('click', function() {
            // Clear any existing data
            localStorage.removeItem('bomberosEmergencias');
            
            // Create test data
            const testData = {
                fecha: '2026-03-22',
                hora: '14:30',
                municipio: 'Medellín',
                tipoIncidente: 'incendio',
                entidadApoyo: 'Policía Nacional',
                nombreAtendio: 'Carlos Ramírez',
                rangoAtendio: 'Sargento',
                nombrePaciente: 'Juan Pérez',
                identificacionPaciente: '12345678',
                edad: '35',
                sexo: 'masculino',
                barrioVereda: 'El Poblado',
                direccion: 'Carrera 43 #10-15',
                latitud: '6.208763',
                longitud: '-75.567430',
                telefono: '3001234567',
                totalAfectados: '2',
                perdidas: 'Daños estructurales en vivienda',
                unidades: '2 unidades de bomberos',
                vehiculos: '1 unidad de rescate, 1 unidad de agua',
                departamento: 'Antioquia',
                observaciones: 'Incendio controlado sin lesionados',
                timestamp: new Date().toISOString()
            };
            
            // Save to localStorage
            const emergencies = [testData];
            localStorage.setItem('bomberosEmergencias', JSON.stringify(emergencies));
            
            // Reload to show records
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
